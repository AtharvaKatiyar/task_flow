version: '3.9'

services:

  backend:
    build:
      context: ./backend
    container_name: taskflow-backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    networks:
      - taskflow-network

  postgres:
    image: postgres:17
    container_name: taskflow-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - taskflow_postgres_data:/var/lib/postgresql/data
    networks:
      - taskflow-network

  redis:
    image: redis:7  
    container_name: taskflow-redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - taskflow_redis_data:/data
    networks:
      - taskflow-network

volumes:
  taskflow_postgres_data:
  taskflow_redis_data:

networks:
  taskflow-network: